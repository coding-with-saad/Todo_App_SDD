openapi: 3.0.0
info:
  title: Todo App Authentication API
  version: 1.0.0
  description: API for user authentication and task management with JWT verification.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
                name: { type: string }
      responses:
        201: { description: User created }
        400: { description: Validation error }

  /auth/login:
    post:
      summary: User login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        200:
          description: Login successful, returns JWT
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        401: { description: Unauthorized }

  /todos:
    get:
      summary: List authenticated user's tasks
      responses:
        200:
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Todo'
        401: { description: Unauthorized }
    post:
      summary: Create a new task for the authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title: { type: string }
                description: { type: string }
      responses:
        201:
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Todo'

components:
  schemas:
    Todo:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        completed: { type: boolean }
        user_id: { type: string }
